{% load static %}

<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>JGK VPN Dashboard</title>

<link rel="stylesheet" href="{% static 'css/style.css' %}">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===================== /
/ VPN CONNECT TOAST /
/ ===================== */

#vpn-toast-container{
    position:fixed;
    bottom:20px;
    right:20px;
    z-index:9999;
}

.vpn-toast{
    background:#1f2a33;
    color:#ffffff;
    padding:12px 18px;
    margin-top:10px;
    border-radius:6px;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
    font-size:14px;
    animation:slideIn 0.3s ease;
}

@keyframes slideIn{
    from{
        transform:translateX(100%);
        opacity:0;
    }
    to{
        transform:translateX(0);
        opacity:1;
    }
}

</style>

</head>

<body>

<div class="topnav">

<div class="logo">JGK</div>

<div class="menu">
<a href="/">Dashboard</a>
<a href="/report/daily/">Napi riport</a>
<a href="/report/weekly/">Heti riport</a>
<a href="/report/monthly/">Havi riport</a>
</div>

</div>

<div class="brandbar"></div>

<div class="container">

{% block content %}
{% endblock %}

</div>

<div id="vpn-toast-container"></div>

<div class="footer">
Józsefvárosi Gazdálkodási Központ Zrt. – Megbízható szolgáltatás
</div>

</body>
</html>

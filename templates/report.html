{% extends "base.html" %}
{% load static %}
{% load duration %}

{% block content %}

<div class="panel">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">

<h2 style="margin:0;">{{ title }}</h2>

<a href="/report/pdf/{{ period }}/" class="menu-btn">
⬇ PDF letöltése
</a>

</div>

<table>

<thead>
<tr>
<th>Felhasználó</th>
<th>Session</th>
<th>Összes VPN idő</th>
</tr>
</thead>

<tbody>

{% for u in users %}

<tr>

<td>
<a href="{% url 'user_history' u.username %}">
{{ u.username }}
</a>
</td>

<td>
{{ u.total_sessions }}
</td>

<td>
{{ u.total_duration|duration_format }}
</td>

</tr>

{% empty %}

<tr>
<td colspan="3" style="text-align:center;padding:20px;">
Nincs adat
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}

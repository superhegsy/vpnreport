{% extends "base.html" %}
{% load static %}

{% block content %}

<h2>{{ title }}</h2>

<div style="margin-bottom:20px;">
<a href="/report/pdf/{{ period }}/" class="menu-btn">
PDF letöltése
</a>
</div>

<div class="panel">

<table>

<thead>
<tr>
<th>Felhasználó</th>
<th>Session</th>
<th>Összes VPN idő</th>
</tr>
</thead>

<tbody>

{% for u in users %}

<tr>

<td>
<a href="{% url 'user_history' u.username %}">
{{ u.username }}
</a>
</td>

<td>
{{ u.total_sessions }}
</td>

<td>
{{ u.duration }}
</td>

</tr>

{% empty %}

<tr>
<td colspan="3" style="text-align:center;padding:20px;">
Nincs adat
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}

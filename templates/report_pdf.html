<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
font-family: Arial, Helvetica, sans-serif;
font-size:12px;
margin:0;
padding:30px;
}

.header{
background:#f4c300;
padding:14px;
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th, td{
padding:8px;
border-bottom:1px solid #ddd;
}

th{
background:#4ea67d;
color:white;
text-align:left;
}

tr:nth-child(even){
background:#f5f5f5;
}

.footer{
margin-top:30px;
background:#4ea67d;
color:white;
padding:10px;
font-size:11px;
}

</style>

</head>

<body>

<div class="header">
{{ title }}
</div>


<table>

<thead>
<tr>
<th>Felhasznalo</th>
<th>Session</th>
<th>Osszes VPN ido</th>
</tr>
</thead>

<tbody>

{% for u in users %}

<tr>

<td>{{ u.username }}</td>
<td>{{ u.total_sessions }}</td>
<td>{{ u.duration }}</td>

</tr>

{% endfor %}

</tbody>

</table>


<div class="footer">

JGK VPN riport rendszer
Generalva: {{ now|date:"Y.m.d H:i" }}

</div>

</body>
</html>
